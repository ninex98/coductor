<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Coductor Artifact / State 流转</title>
  <desc id="desc">Coductor 的固定 Artifact 链、RunStatus 状态机、SQLite 持久化与确定性保障机制，展示 YAML Artifact 如何作为阶段事实来源。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBFDFF"/>
      <stop offset="0.56" stop-color="#F4F8FC"/>
      <stop offset="1" stop-color="#EEF4FA"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#263858"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9Z" fill="#6B7C93"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9Z" fill="#BD5B5B"/>
    </marker>
    <style>
      <![CDATA[
      svg {
        font-family: "Inter", "SF Pro Display", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
        text-rendering: geometricPrecision;
      }
      .title { font-size: 44px; font-weight: 820; fill: #111827; letter-spacing: 0; }
      .subtitle { font-size: 18px; font-weight: 560; fill: #506176; }
      .eyebrow { font-size: 12px; font-weight: 780; fill: #6B7C93; letter-spacing: .16em; text-transform: uppercase; }
      .section-title { font-size: 22px; font-weight: 810; fill: #172033; }
      .section-sub { font-size: 13px; font-weight: 560; fill: #64748B; }
      .file-title { font-size: 14.5px; font-weight: 800; fill: #172033; }
      .file-sub { font-size: 11px; font-weight: 610; fill: #64748B; }
      .state-title { font-size: 14.5px; font-weight: 800; fill: #172033; }
      .state-sub { font-size: 11px; font-weight: 600; fill: #64748B; }
      .chip { font-size: 12px; font-weight: 720; fill: #334155; }
      .small { font-size: 11px; font-weight: 650; fill: #64748B; }
      .legend { font-size: 12px; font-weight: 650; fill: #475569; }
      .glass { fill: rgba(255,255,255,.88); stroke: #D8E0EA; stroke-width: 1; }
      .hero { fill: rgba(255,255,255,.82); stroke: #D8E0EA; stroke-width: 1; }
      .dark { fill: url(#navy); }
      .file { fill: #FFFFFF; stroke: #D8E0EA; stroke-width: 1; }
      .file-key { fill: #F5F3FF; stroke: #DDD6FE; stroke-width: 1; }
      .file-final { fill: #F2FBF7; stroke: #CFE8DA; stroke-width: 1; }
      .repair { fill: #FFF0F0; stroke: #F0C4C4; stroke-width: 1; }
      .store { fill: #ECFEFF; stroke: #BCEAF1; stroke-width: 1; }
      .state { fill: #FFFFFF; stroke: #D8E0EA; stroke-width: 1; }
      .state-live { fill: #F2FBF7; stroke: #CFE8DA; stroke-width: 1; }
      .state-warn { fill: #FFF7DC; stroke: #F0DDAA; stroke-width: 1; }
      .state-fail { fill: #FFF0F0; stroke: #F0C4C4; stroke-width: 1; }
      .line { fill: none; stroke: #6B7C93; stroke-width: 1.45; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #9AA8BC; stroke-width: 1.15; stroke-dasharray: 6 7; marker-end: url(#arrow); }
      .line-red { fill: none; stroke: #BD5B5B; stroke-width: 1.45; marker-end: url(#arrowRed); }
      ]]>
    </style>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <path d="M78 210 C410 135 650 250 932 190 C1210 132 1458 122 1722 206" fill="none" stroke="#DFEAF5" stroke-width="1.2"/>
  <path d="M92 882 C430 806 690 916 966 840 C1240 770 1488 804 1710 874" fill="none" stroke="#E2EBF4" stroke-width="1.2"/>

  <!-- Hero -->
  <rect x="64" y="42" width="1672" height="132" rx="34" class="hero" filter="url(#shadow)"/>
  <g transform="translate(100 72)">
    <rect width="70" height="70" rx="24" class="dark"/>
    <path d="M24 24H48V48H24Z" stroke="#99F6E4" stroke-width="2.2" fill="none" rx="4"/>
    <path d="M30 33H42M30 40H42" stroke="#99F6E4" stroke-width="2.1" stroke-linecap="round"/>
  </g>
  <text x="196" y="92" class="eyebrow">Artifact / State Contract</text>
  <text x="196" y="134" class="title">Coductor Artifact / State 流转</text>
  <text x="1058" y="96" class="subtitle">固定 Artifact 链 + 可恢复状态机 + 可审计证据体系</text>
  <g transform="translate(1058 116)">
    <rect width="520" height="34" rx="17" fill="#172033"/>
    <text x="22" y="22" fill="#EAF2FF" font-size="13" font-weight="720">YAML 是阶段事实来源；SQLite 保存索引、事件、checkpoint 和锁</text>
  </g>

  <!-- Artifact chain -->
  <rect x="74" y="216" width="1652" height="320" rx="36" class="glass" filter="url(#shadow)"/>
  <text x="112" y="258" class="eyebrow">A. Fixed Artifact Chain</text>
  <text x="112" y="292" class="section-title">固定 Artifact 链</text>
  <text x="112" y="316" class="section-sub">主图只展示交接边界；任务内部文件折叠到 tasks/T###</text>

  <g transform="translate(112 372)">
    <g>
      <rect width="138" height="72" rx="22" class="file-key" filter="url(#softShadow)"/>
      <text x="20" y="30" class="file-title">00_goal</text>
      <text x="20" y="50" class="file-sub">goal.yaml</text>
    </g>
    <path d="M148 36H184" class="line"/>
    <g transform="translate(194 0)">
      <rect width="158" height="72" rx="22" class="file" filter="url(#softShadow)"/>
      <text x="20" y="30" class="file-title">01_snapshot</text>
      <text x="20" y="50" class="file-sub">repository context</text>
    </g>
    <path d="M362 36H398" class="line"/>
    <g transform="translate(408 0)">
      <rect width="138" height="72" rx="22" class="file-key" filter="url(#softShadow)"/>
      <text x="20" y="30" class="file-title">02_spec</text>
      <text x="20" y="50" class="file-sub">contract</text>
    </g>
    <path d="M556 36H592" class="line"/>
    <g transform="translate(602 0)">
      <rect width="158" height="72" rx="22" class="file-key" filter="url(#softShadow)"/>
      <text x="20" y="30" class="file-title">03_plan</text>
      <text x="20" y="50" class="file-sub">execution plan</text>
    </g>
    <path d="M770 36H806" class="line"/>
    <g transform="translate(816 0)">
      <rect width="166" height="72" rx="22" class="file" filter="url(#softShadow)"/>
      <text x="20" y="30" class="file-title">tasks/T###</text>
      <text x="20" y="50" class="file-sub">task / request / result</text>
    </g>
    <path d="M992 36H1028" class="line"/>
    <g transform="translate(1038 0)">
      <rect width="150" height="72" rx="22" class="file" filter="url(#softShadow)"/>
      <text x="20" y="30" class="file-title">04_integration</text>
      <text x="20" y="50" class="file-sub">merge / diff</text>
    </g>
    <path d="M1198 36H1234" class="line"/>
    <g transform="translate(1244 0)">
      <rect width="142" height="72" rx="22" class="file-key" filter="url(#softShadow)"/>
      <text x="20" y="30" class="file-title">05_gate</text>
      <text x="20" y="50" class="file-sub">quality report</text>
    </g>
    <path d="M1396 36H1432" class="line"/>
    <g transform="translate(1442 0)">
      <rect width="136" height="72" rx="22" class="file-key" filter="url(#softShadow)"/>
      <text x="20" y="30" class="file-title">Evidence</text>
      <text x="20" y="50" class="file-sub">06 / 07 / report</text>
    </g>
  </g>

  <g transform="translate(112 468)">
    <rect width="350" height="34" rx="17" fill="#F8FAFC" stroke="#D8E0EA"/>
    <text x="20" y="22" class="chip">08_release_manifest.yaml 由 release 命令生成</text>
  </g>
  <g transform="translate(486 468)">
    <rect width="348" height="34" rx="17" fill="#F8FAFC" stroke="#D8E0EA"/>
    <text x="20" y="22" class="chip">patch.diff 是证据文件，不是 Envelope YAML</text>
  </g>

  <!-- Lower grid: repair + sqlite + safeguards -->
  <g transform="translate(74 584)">
    <rect width="500" height="294" rx="34" class="glass" filter="url(#shadow)"/>
    <text x="34" y="44" class="eyebrow">B. Repair Evidence</text>
    <text x="34" y="78" class="section-title">修复证据链</text>
    <text x="34" y="102" class="section-sub">Gate 失败后生成 repair Artifact，再回到 Gate 重验</text>
    <g transform="translate(34 144)">
      <rect width="130" height="58" rx="19" class="repair"/>
      <text x="18" y="25" class="file-title">repair_request</text>
      <text x="18" y="43" class="file-sub">request.yaml</text>
    </g>
    <path d="M172 173H208" class="line-red"/>
    <g transform="translate(218 144)">
      <rect width="130" height="58" rx="19" class="repair"/>
      <text x="18" y="25" class="file-title">repair_result</text>
      <text x="18" y="43" class="file-sub">result.yaml</text>
    </g>
    <path d="M356 173H392" class="line-red"/>
    <g transform="translate(402 144)">
      <rect width="62" height="58" rx="19" class="file-key"/>
      <text x="16" y="25" class="file-title">Gate</text>
      <text x="17" y="43" class="file-sub">rerun</text>
    </g>
    <g transform="translate(34 226)">
      <rect width="194" height="34" rx="17" fill="#FFF7DC" stroke="#F0DDAA"/>
      <text x="18" y="22" class="chip">failure_fingerprint</text>
    </g>
    <g transform="translate(246 226)">
      <rect width="160" height="34" rx="17" fill="#FFF7DC" stroke="#F0DDAA"/>
      <text x="18" y="22" class="chip">max repair = 2</text>
    </g>
  </g>

  <g transform="translate(610 584)">
    <rect width="524" height="294" rx="34" class="glass" filter="url(#shadow)"/>
    <text x="34" y="44" class="eyebrow">C. SQLite Persistence</text>
    <text x="34" y="78" class="section-title">SQLite 持久化</text>
    <text x="34" y="102" class="section-sub">不保存阶段业务事实，只保存运行索引和恢复所需元数据</text>
    <g transform="translate(34 140)">
      <rect width="202" height="56" rx="18" class="store"/>
      <text x="20" y="25" class="file-title">runs</text>
      <text x="20" y="43" class="file-sub">status · run_dir</text>
    </g>
    <g transform="translate(264 140)">
      <rect width="202" height="56" rx="18" class="store"/>
      <text x="20" y="25" class="file-title">events</text>
      <text x="20" y="43" class="file-sub">timeline</text>
    </g>
    <g transform="translate(34 214)">
      <rect width="202" height="56" rx="18" class="store"/>
      <text x="20" y="25" class="file-title">workflow_checkpoints</text>
      <text x="20" y="43" class="file-sub">WorkflowState JSON</text>
    </g>
    <g transform="translate(264 214)">
      <rect width="202" height="56" rx="18" class="store"/>
      <text x="20" y="25" class="file-title">run_locks</text>
      <text x="20" y="43" class="file-sub">resume / control</text>
    </g>
  </g>

  <g transform="translate(1170 584)">
    <rect width="556" height="294" rx="34" class="glass" filter="url(#shadow)"/>
    <text x="34" y="44" class="eyebrow">E. Deterministic Safeguards</text>
    <text x="34" y="78" class="section-title">确定性保障机制</text>
    <text x="34" y="102" class="section-sub">Hash、revision、lineage 与 checkpoint 共同支撑可恢复和可审计</text>
    <g transform="translate(34 140)">
      <rect width="150" height="42" rx="21" class="file"/>
      <text x="21" y="27" class="chip">content_sha256</text>
    </g>
    <g transform="translate(202 140)">
      <rect width="148" height="42" rx="21" class="file"/>
      <text x="23" y="27" class="chip">revision</text>
    </g>
    <g transform="translate(368 140)">
      <rect width="132" height="42" rx="21" class="file"/>
      <text x="27" y="27" class="chip">history</text>
    </g>
    <g transform="translate(34 202)">
      <rect width="214" height="42" rx="21" class="file"/>
      <text x="21" y="27" class="chip">inputs[path, sha256]</text>
    </g>
    <g transform="translate(266 202)">
      <rect width="150" height="42" rx="21" class="file"/>
      <text x="22" y="27" class="chip">stale_artifacts</text>
    </g>
    <g transform="translate(34 252)">
      <rect width="206" height="28" rx="14" fill="#F8FAFC" stroke="#D8E0EA"/>
      <text x="18" y="19" class="small">checkpoint resume</text>
    </g>
  </g>

  <!-- RunStatus -->
  <rect x="74" y="916" width="1652" height="116" rx="34" class="glass" filter="url(#shadow)"/>
  <text x="112" y="958" class="eyebrow">D. RunStatus State Machine</text>
  <text x="112" y="992" class="section-title">真实持久化状态</text>
  <text x="112" y="1016" class="section-sub">图中展示源码枚举；控制动作状态作为事件/控制面语义，不混作 RunStatus</text>

  <g transform="translate(500 944)">
    <g>
      <rect width="94" height="52" rx="18" class="state"/>
      <text x="24" y="31" class="state-title">created</text>
    </g>
    <path d="M104 26H136" class="line"/>
    <g transform="translate(146 0)">
      <rect width="94" height="52" rx="18" class="state-live"/>
      <text x="24" y="31" class="state-title">running</text>
    </g>
    <path d="M250 26H282" class="line"/>
    <g transform="translate(292 0)">
      <rect width="154" height="52" rx="18" class="state-warn"/>
      <text x="20" y="31" class="state-title">human_required</text>
    </g>
    <path d="M456 26H488" class="line-soft"/>
    <g transform="translate(498 0)">
      <rect width="194" height="52" rx="18" class="state-live"/>
      <text x="20" y="31" class="state-title">ready_for_human_review</text>
    </g>
    <g transform="translate(720 0)">
      <rect width="86" height="52" rx="18" class="state-warn"/>
      <text x="21" y="31" class="state-title">paused</text>
    </g>
    <g transform="translate(828 0)">
      <rect width="88" height="52" rx="18" class="state-warn"/>
      <text x="21" y="31" class="state-title">stopped</text>
    </g>
    <g transform="translate(938 0)">
      <rect width="78" height="52" rx="18" class="state-fail"/>
      <text x="23" y="31" class="state-title">failed</text>
    </g>
  </g>

  <!-- Legend -->
  <rect x="74" y="1052" width="1652" height="32" rx="16" fill="#FFFFFF" stroke="#D8E0EA"/>
  <text x="112" y="1073" class="legend">实线：下游事实输入 / 阶段推进</text>
  <text x="392" y="1073" class="legend">虚线：控制或恢复关系</text>
  <text x="630" y="1073" class="legend">红色：失败修复回路</text>
  <text x="1312" y="1073" class="legend">不展示 YAML 字段、SQLite 字段和服务方法</text>
</svg>
