<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Coductor 系统架构总览</title>
  <desc id="desc">Coductor 的产品级系统架构总览，展示入口、控制平面、LangGraph 编排、执行与质量闭环、YAML Artifact、SQLite 和目标 Git 仓库之间的主要边界。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBFDFF"/>
      <stop offset="0.55" stop-color="#F4F8FC"/>
      <stop offset="1" stop-color="#EEF4FA"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#263858"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9Z" fill="#6B7C93"/>
    </marker>
    <style>
      <![CDATA[
      svg {
        font-family: "Inter", "SF Pro Display", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
        text-rendering: geometricPrecision;
      }
      .title { font-size: 44px; font-weight: 820; fill: #111827; letter-spacing: 0; }
      .subtitle { font-size: 18px; font-weight: 560; fill: #506176; }
      .eyebrow { font-size: 12px; font-weight: 780; fill: #6B7C93; letter-spacing: .16em; text-transform: uppercase; }
      .panel-title { font-size: 21px; font-weight: 800; fill: #172033; }
      .panel-sub { font-size: 13px; font-weight: 560; fill: #66768A; }
      .card-title { font-size: 16px; font-weight: 790; fill: #172033; }
      .card-sub { font-size: 11.5px; font-weight: 580; fill: #64748B; }
      .small { font-size: 11px; font-weight: 700; fill: #64748B; }
      .chip-text { font-size: 12.5px; font-weight: 720; fill: #334155; }
      .legend { font-size: 12px; font-weight: 650; fill: #475569; }
      .glass { fill: rgba(255,255,255,.88); stroke: #D8E0EA; stroke-width: 1; }
      .hero { fill: rgba(255,255,255,.82); stroke: #D8E0EA; stroke-width: 1; }
      .dark { fill: url(#navy); }
      .entry { fill: #F1F7FF; stroke: #CFE2F5; }
      .orch { fill: #F2FBF7; stroke: #CFE8DA; }
      .exec { fill: #FFF8F2; stroke: #EED8C8; }
      .artifact { fill: #F5F3FF; stroke: #DDD6FE; }
      .store { fill: #ECFEFF; stroke: #BCEAF1; }
      .planned { fill: #F8FAFC; stroke: #94A3B8; stroke-width: 1.2; stroke-dasharray: 7 5; }
      .line { fill: none; stroke: #6B7C93; stroke-width: 1.45; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #9AA8BC; stroke-width: 1.15; stroke-dasharray: 6 7; marker-end: url(#arrow); }
      ]]>
    </style>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <path d="M80 206 C390 128 656 250 920 190 C1190 130 1420 120 1720 205" fill="none" stroke="#DFEAF5" stroke-width="1.2"/>
  <path d="M90 892 C430 805 690 920 972 850 C1210 790 1485 806 1710 872" fill="none" stroke="#E2EBF4" stroke-width="1.2"/>

  <!-- Hero -->
  <rect x="64" y="42" width="1672" height="136" rx="34" class="hero" filter="url(#shadow)"/>
  <g transform="translate(100 75)">
    <rect width="70" height="70" rx="24" class="dark"/>
    <path d="M22 35H48M35 22V48" stroke="#99F6E4" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <text x="196" y="92" class="eyebrow">AI Coding Workflow Engine</text>
  <text x="196" y="134" class="title">Coductor 系统架构总览</text>
  <text x="1128" y="96" class="subtitle">本地运行 · 固定 Artifact 契约 · 质量门与证据化交付</text>
  <g transform="translate(1128 116)">
    <rect width="478" height="34" rx="17" fill="#172033"/>
    <text x="22" y="22" fill="#EAF2FF" font-size="13" font-weight="720">Goal → Workflow → Verified Evidence</text>
  </g>

  <!-- Main stage rail -->
  <rect x="118" y="222" width="1564" height="118" rx="30" class="glass" filter="url(#softShadow)"/>
  <text x="154" y="264" class="panel-title">核心主线</text>
  <text x="154" y="288" class="panel-sub">单向主线：目标契约、执行、验证与证据交付</text>
  <g transform="translate(480 248)">
    <g>
      <rect width="120" height="56" rx="18" class="entry"/>
      <text x="32" y="24" class="card-title">Goal</text>
      <text x="26" y="43" class="card-sub">目标契约</text>
    </g>
    <path d="M130 28H168" class="line"/>
    <g transform="translate(178 0)">
      <rect width="120" height="56" rx="18" class="orch"/>
      <text x="36" y="24" class="card-title">Spec</text>
      <text x="27" y="43" class="card-sub">范围与验收</text>
    </g>
    <path d="M308 28H346" class="line"/>
    <g transform="translate(356 0)">
      <rect width="120" height="56" rx="18" class="orch"/>
      <text x="36" y="24" class="card-title">Plan</text>
      <text x="26" y="43" class="card-sub">任务与边界</text>
    </g>
    <path d="M486 28H524" class="line"/>
    <g transform="translate(534 0)">
      <rect width="132" height="56" rx="18" class="exec"/>
      <text x="34" y="24" class="card-title">Execute</text>
      <text x="28" y="43" class="card-sub">后端执行</text>
    </g>
    <path d="M676 28H714" class="line"/>
    <g transform="translate(724 0)">
      <rect width="122" height="56" rx="18" class="exec"/>
      <text x="34" y="24" class="card-title">Verify</text>
      <text x="31" y="43" class="card-sub">质量门</text>
    </g>
    <path d="M856 28H894" class="line"/>
    <g transform="translate(904 0)">
      <rect width="130" height="56" rx="18" class="artifact"/>
      <text x="30" y="24" class="card-title">Deliver</text>
      <text x="24" y="43" class="card-sub">Evidence</text>
    </g>
  </g>

  <!-- Architecture panels -->
  <g transform="translate(118 382)">
    <rect width="360" height="360" rx="34" class="glass" filter="url(#shadow)"/>
    <text x="30" y="44" class="eyebrow">Entry Surface</text>
    <text x="30" y="78" class="panel-title">用户入口</text>
    <text x="30" y="102" class="panel-sub">CLI 与本地控制台进入同一控制平面</text>
    <g transform="translate(30 136)">
      <rect width="300" height="62" rx="20" class="entry"/>
      <text x="22" y="27" class="card-title">CLI / coductor run</text>
      <text x="22" y="46" class="card-sub">init · run · resume · report</text>
    </g>
    <g transform="translate(30 214)">
      <rect width="300" height="62" rx="20" class="entry"/>
      <text x="22" y="27" class="card-title">Local Web Console</text>
      <text x="22" y="46" class="card-sub">serve · loopback-first · control</text>
    </g>
    <g transform="translate(30 292)">
      <rect width="300" height="42" rx="18" fill="#F8FAFC" stroke="#D8E0EA"/>
      <text x="22" y="27" class="chip-text">Operator actions: approve / pause / stop</text>
    </g>
  </g>

  <g transform="translate(520 382)">
    <rect width="468" height="360" rx="34" class="glass" filter="url(#shadow)"/>
    <text x="30" y="44" class="eyebrow">Control &amp; Orchestration</text>
    <text x="30" y="78" class="panel-title">控制平面 / LangGraph</text>
    <text x="30" y="102" class="panel-sub">RunService 创建 Run，LangGraph 驱动固定节点</text>
    <g transform="translate(30 136)">
      <rect width="188" height="72" rx="22" class="orch"/>
      <text x="22" y="31" class="card-title">RunService</text>
      <text x="22" y="51" class="card-sub">create / resume / events</text>
    </g>
    <g transform="translate(248 136)">
      <rect width="188" height="72" rx="22" class="orch"/>
      <text x="22" y="31" class="card-title">LangGraph</text>
      <text x="22" y="51" class="card-sub">StateGraph workflow</text>
    </g>
    <g transform="translate(30 228)">
      <rect width="188" height="72" rx="22" class="orch"/>
      <text x="22" y="31" class="card-title">WorkflowState</text>
      <text x="22" y="51" class="card-sub">status · stage · artifacts</text>
    </g>
    <g transform="translate(248 228)">
      <rect width="188" height="72" rx="22" class="store"/>
      <text x="22" y="31" class="card-title">Checkpoint Store</text>
      <text x="22" y="51" class="card-sub">resume snapshots</text>
    </g>
  </g>

  <g transform="translate(1030 382)">
    <rect width="326" height="360" rx="34" class="glass" filter="url(#shadow)"/>
    <text x="30" y="44" class="eyebrow">Deterministic Services</text>
    <text x="30" y="78" class="panel-title">确定性服务</text>
    <text x="30" y="102" class="panel-sub">代码审计、规格、计划与产物写入</text>
    <g transform="translate(30 136)">
      <rect width="266" height="54" rx="18" fill="#FFFFFF" stroke="#D8E0EA"/>
      <text x="20" y="24" class="card-title">RepositoryInspector</text>
      <text x="20" y="41" class="card-sub">git · manifests · risks</text>
    </g>
    <g transform="translate(30 204)">
      <rect width="266" height="54" rx="18" fill="#FFFFFF" stroke="#D8E0EA"/>
      <text x="20" y="24" class="card-title">Spec Builder / Planning</text>
      <text x="20" y="41" class="card-sub">scope · criteria · strategy</text>
    </g>
    <g transform="translate(30 272)">
      <rect width="266" height="54" rx="18" class="artifact"/>
      <text x="20" y="24" class="card-title">WorkflowArtifactWriter</text>
      <text x="20" y="41" class="card-sub">fixed YAML outputs</text>
    </g>
  </g>

  <g transform="translate(1398 382)">
    <rect width="284" height="360" rx="34" class="glass" filter="url(#shadow)"/>
    <text x="30" y="44" class="eyebrow">Execution &amp; Quality</text>
    <text x="30" y="78" class="panel-title">执行与质量闭环</text>
    <text x="30" y="102" class="panel-sub">后端执行、质量门、修复和审查</text>
    <g transform="translate(30 136)">
      <rect width="224" height="52" rx="18" class="exec"/>
      <text x="18" y="23" class="card-title">CodexExecBackend</text>
      <text x="18" y="40" class="card-sub">codex exec adapter</text>
    </g>
    <g transform="translate(30 200)">
      <rect width="224" height="52" rx="18" class="exec"/>
      <text x="18" y="23" class="card-title">Gate / Repair / Review</text>
      <text x="18" y="40" class="card-sub">bounded quality loop</text>
    </g>
    <g transform="translate(30 264)">
      <rect width="224" height="52" rx="18" class="planned"/>
      <text x="18" y="23" class="card-title">CodexSdkBackend</text>
      <text x="18" y="40" class="card-sub">Planned placeholder</text>
    </g>
  </g>

  <path d="M480 562H510" class="line"/>
  <path d="M990 562H1020" class="line"/>
  <path d="M1358 562H1388" class="line"/>

  <!-- Truth layer -->
  <rect x="118" y="794" width="1564" height="178" rx="34" class="glass" filter="url(#shadow)"/>
  <text x="154" y="836" class="eyebrow">Truth Layer</text>
  <text x="154" y="870" class="panel-title">产物、状态与仓库边界</text>
  <text x="154" y="894" class="panel-sub">Artifact 为事实来源；SQLite 仅保存运行元数据</text>
  <g transform="translate(510 832)">
    <rect width="210" height="82" rx="24" class="artifact"/>
    <text x="24" y="34" class="card-title">YAML Artifacts</text>
    <text x="24" y="55" class="card-sub">revision · lineage · hash</text>
  </g>
  <g transform="translate(748 832)">
    <rect width="210" height="82" rx="24" class="store"/>
    <text x="24" y="34" class="card-title">SQLite</text>
    <text x="24" y="55" class="card-sub">runs · events · locks</text>
  </g>
  <g transform="translate(986 832)">
    <rect width="220" height="82" rx="24" fill="#FFFFFF" stroke="#D8E0EA"/>
    <text x="24" y="34" class="card-title">Target Git Repo</text>
    <text x="24" y="55" class="card-sub">diff · worktree · inspection</text>
  </g>
  <g transform="translate(1234 832)">
    <rect width="220" height="82" rx="24" class="artifact"/>
    <text x="24" y="34" class="card-title">Evidence / Report</text>
    <text x="24" y="55" class="card-sub">07_evidence · report.md</text>
  </g>

  <!-- Legend -->
  <rect x="118" y="1010" width="1564" height="46" rx="23" fill="#FFFFFF" stroke="#D8E0EA" filter="url(#softShadow)"/>
  <g transform="translate(154 1024)">
    <circle cx="8" cy="8" r="5" fill="#2F6F9F"/>
    <text x="24" y="13" class="legend">已实现模块</text>
  </g>
  <g transform="translate(300 1024)">
    <circle cx="8" cy="8" r="5" fill="#2D8A5F"/>
    <text x="24" y="13" class="legend">确定性主线</text>
  </g>
  <g transform="translate(456 1024)">
    <rect width="16" height="10" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-dasharray="4 3"/>
    <text x="30" y="13" class="legend">Planned / 占位能力</text>
  </g>
  <text x="1212" y="1037" class="legend">不展示完整 CLI、表字段和 YAML 字段，细节留给文档正文</text>
</svg>
